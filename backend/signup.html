<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Snappito</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="toast.css">
  <style>
    :root {
      --primary: #10b981;
      --secondary: #f59e0b;
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.8);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --bg-gradient: linear-gradient(-45deg, #022c22, #064e3b, #047857, #10b981);
      --bg-fallback: #022c22;
    }

    body.light-theme {
      --text-main: #1a2e22;
      --text-muted: #4b6355;
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(16, 185, 129, 0.2);
      --bg-gradient: linear-gradient(-45deg, #ecfdf5, #d1fae5, #a7f3d0, #6ee7b7);
      --bg-fallback: #ecfdf5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      background-color: var(--bg-fallback);
      background-image: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      will-change: background-position;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .auth-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      text-align: center;
    }
    h2 { font-family: 'Outfit', sans-serif; font-size: 28px; margin-bottom: 25px; }
    .input-group { text-align: left; margin-bottom: 15px; }
    label { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; display: block; }
    input {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0, 0, 0, 0.2);
      color: white;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    input:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.3); }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--secondary);
      color: #111;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 15px;
    }
    .btn:hover { background: #fbbf24; transform: translateY(-2px); }
    .error-msg { color: #f87171; font-size: 14px; margin-bottom: 15px; display: none; }
    .links { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
    .links a { color: var(--secondary); text-decoration: none; font-weight: 500; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="auth-card">
  <h2>Create Account</h2>
  
  <form id="signupForm">
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="fullname" required>
    </div>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>
    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" required>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required minlength="6">
    </div>
    <button type="submit" class="btn" id="submitBtn">Sign Up</button>
  </form>
  
  <div class="links">
    Already have an account? <a href="login.html">Log In</a><br><br>
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script src="config.js"></script>
<script src="toast.js"></script>
<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    
    btn.textContent = 'Creating Account...';
    btn.disabled = true;

    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          full_name: document.getElementById('fullname').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          password: document.getElementById('password').value
        })
      });
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('token', data.token);
        showToast('Account created successfully! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        showToast(data.error || 'Signup failed. Email might already exist.', 'error');
        btn.textContent = 'Sign Up';
        btn.disabled = false;
      }
    } catch (error) {
      showToast('Network error. Make sure the server is running.', 'error');
      btn.textContent = 'Sign Up';
      btn.disabled = false;
    }
  });

  // Real-time Form Validation
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', function() {
      if(this.type === 'email' || this.id.toLowerCase().includes('email')) {
        const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
        this.style.borderColor = isValid ? 'var(--primary)' : '#ef4444';
      }
      if(this.type === 'password') {
        const isValid = this.value.length >= 6;
        this.style.borderColor = isValid ? 'var(--primary)' : '#ef4444';
      }
      if(this.value === '') {
        this.style.borderColor = 'rgba(255,255,255,0.1)';
      }
    });
  });

  // Theme Toggle Logic
  const themeBtn = document.createElement('button');
  themeBtn.id = 'theme-toggle';
  themeBtn.innerHTML = localStorage.getItem('theme') === 'light' ? '☀️' : '🌙';
  themeBtn.style.cssText = 'position:fixed; top:20px; right:20px; background:var(--glass-bg); border:1px solid var(--glass-border); padding:10px; border-radius:50%; font-size:20px; cursor:pointer; color:var(--text-main); z-index:1000;';
  document.body.appendChild(themeBtn);

  const body = document.body;
  if (localStorage.getItem('theme') === 'light') body.classList.add('light-theme');

  themeBtn.addEventListener('click', () => {
    body.classList.toggle('light-theme');
    const isLight = body.classList.contains('light-theme');
    themeBtn.innerHTML = isLight ? '☀️' : '🌙';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  });
</script>

</body>
</html>
