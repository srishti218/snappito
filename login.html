<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Snappito</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --secondary: #f59e0b;
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.8);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      background: linear-gradient(-45deg, #022c22, #064e3b, #047857, #10b981);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .auth-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      text-align: center;
    }
    h2 { font-family: 'Outfit', sans-serif; font-size: 32px; margin-bottom: 30px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    label { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; display: block; }
    input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(0, 0, 0, 0.2);
      color: white;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    input:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.3); }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--secondary);
      color: #111;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn:hover { background: #fbbf24; transform: translateY(-2px); }
    .error-msg { color: #f87171; font-size: 14px; margin-bottom: 15px; display: none; }
    .links { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
    .links a { color: var(--secondary); text-decoration: none; font-weight: 500; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="auth-card">
  <div style="font-family: 'Outfit'; font-size:24px; font-weight:800; margin-bottom: 20px;">Snappito<span>⚡</span></div>
  <h2>Welcome Back</h2>
  <div id="error" class="error-msg"></div>
  
  <form id="loginForm">
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">Log In</button>
  </form>
  
  <div class="links">
    Don't have an account? <a href="signup.html">Sign Up</a><br><br>
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('error');
    
    btn.textContent = 'Logging in...';
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } else {
        err.textContent = data.error || 'Login failed. Please check your credentials.';
        err.style.display = 'block';
        btn.textContent = 'Log In';
        btn.disabled = false;
      }
    } catch (error) {
      err.textContent = 'Network error. Make sure the server is running.';
      err.style.display = 'block';
      btn.textContent = 'Log In';
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
