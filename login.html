<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Snappito</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="src/components/ui/Toast.css">
  <style>
    body {
      background-color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #1e293b;
    }
    .auth-card {
      background: white;
      width: 100%;
      max-width: 450px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
      border: 1px solid #e2e8f0;
    }
    .auth-header {
      background: white;
      padding: 30px;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
    }
    .auth-body {
      padding: 40px;
    }
    h2 { font-family: 'Outfit'; margin-bottom: 30px; font-size: 28px; text-align: center; }
    .input-group { margin-bottom: 24px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; opacity: 0.8; }
    input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #1e293b;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
      box-sizing: border-box;
    }
    input:focus { border-color: var(--primary); background: rgba(0,0,0,0.3); }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--secondary);
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <img src="src/assets/images/logo_white.png" alt="Snappito" style="height: 85px; cursor: pointer;" onclick="window.location.href='index.html'">
  </div>
  <div class="auth-body">
    <h2>Welcome Back</h2>
    <form id="loginForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Log In</button>
    </form>
    <div style="margin-top: 30px; text-align: center; font-size: 14px; opacity: 0.8;">
      Don't have an account? <a href="signup.html" style="color: var(--secondary); text-decoration: none; font-weight: 700;">Sign Up</a><br><br>
      <a href="index.html" style="text-decoration: none; color: inherit; opacity: 0.6;">← Back to Home</a>
    </div>
  </div>
</div>
<script src="src/components/ui/Toast.js"></script>
<script type="module" src="src/app/Auth.js"></script>
</body>
</html>
