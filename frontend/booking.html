<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Service – Snappito</title>
  <meta name="description" content="Confirm your Snappito home service booking. Review your selected service before scheduling.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="toast.css">

  <style>
    :root {
      --primary:      #10b981;
      --secondary:    #f59e0b;
      --danger:       #ef4444;
      --text-main:    #ffffff;
      --text-muted:   rgba(255,255,255,0.72);
      --glass-bg:     rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.16);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.25);
      --bg-gradient:  linear-gradient(-45deg, #022c22, #064e3b, #047857, #10b981);
      --bg-fallback:  #022c22;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      background: var(--bg-fallback);
      background-image: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1,h2,h3,h4,h5,h6 { font-family: 'Outfit', sans-serif; }

    /* ─── Nav ──────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 18px 24px;
      display: flex; align-items: center; gap: 14px;
      background: rgba(1,28,18,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .nav-back {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; text-decoration: none;
      transition: background 0.25s, transform 0.25s; flex-shrink: 0;
    }
    .nav-back:hover { background: rgba(255,255,255,0.15); transform: translateX(-2px); }

    .nav-logo {
      font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 800;
      text-decoration: none; color: white;
    }
    .nav-logo span { color: var(--secondary); }

    /* ─── Page ─────────────────────────────────────────────────── */
    .page {
      max-width: 680px; margin: 0 auto;
      padding: 100px 16px 60px;
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(22px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ─── Service Summary Bar ──────────────────────────────────── */
    .service-summary {
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px 22px;
      margin-bottom: 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      box-shadow: var(--glass-shadow);
      animation: slideUp 0.4s ease both;
    }

    .ss-left { display: flex; flex-direction: column; gap: 2px; }
    .ss-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
    .ss-name { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; }
    .ss-right { text-align: right; flex-shrink: 0; }
    .ss-price {
      font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800;
      color: var(--secondary);
    }
    .ss-price sub { font-size: 12px; font-weight: 500; color: var(--text-muted); vertical-align: middle; }

    .change-link {
      display: inline-block;
      font-size: 12px; color: var(--primary); text-decoration: none;
      margin-top: 4px; font-weight: 600;
      transition: opacity 0.2s;
    }
    .change-link:hover { opacity: 0.7; }

    /* ─── Form Card ────────────────────────────────────────────── */
    .form-card {
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px 24px;
      box-shadow: var(--glass-shadow);
      animation: slideUp 0.45s ease 0.08s both;
    }

    .form-card h2 {
      font-size: 24px; margin-bottom: 6px;
    }
    .form-card .subtitle {
      color: var(--text-muted); font-size: 14px; margin-bottom: 26px;
    }

    form { display: flex; flex-direction: column; gap: 18px; }

    .input-group { display: flex; flex-direction: column; gap: 7px; }
    .input-group label {
      font-size: 13px; font-weight: 600; color: var(--text-muted); padding-left: 4px;
    }

    input, textarea, select {
      width: 100%; padding: 14px 18px;
      background: rgba(0,0,0,0.2);
      color: white;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      font-family: 'Inter', sans-serif; font-size: 15px;
      transition: all 0.3s ease;
      appearance: none;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0,0,0,0.3);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
    }

    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 16px;
    }
    select option, select optgroup { background: #022c22; color: white; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Phone prefix */
    .phone-row {
      display: flex; align-items: center;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; overflow: hidden;
      transition: all 0.3s;
    }
    .phone-row:focus-within {
      border-color: var(--primary);
      background: rgba(0,0,0,0.3);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
    }
    .phone-prefix {
      padding: 0 14px; color: var(--secondary);
      font-weight: 800; font-size: 15px;
      border-right: 1px solid rgba(255,255,255,0.1);
      height: 50px; display: flex; align-items: center;
      background: rgba(255,255,255,0.03); user-select: none; flex-shrink: 0;
    }
    .phone-row input {
      border: none !important; background: transparent !important;
      box-shadow: none !important; padding: 14px 14px !important; margin: 0;
    }

    /* Address inline */
    .addr-inline {
      display: none; margin-top: 12px; padding: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed var(--glass-border); border-radius: 12px;
    }
    .addr-inline .two-col { margin-top: 0; }

    /* Submit */
    .submit-btn {
      padding: 16px; font-family: 'Outfit', sans-serif;
      font-size: 18px; font-weight: 800;
      border: none; border-radius: 50px; cursor: pointer;
      background: var(--secondary); color: #111827;
      box-shadow: 0 4px 20px rgba(245,158,11,0.35);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      margin-top: 6px;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,158,11,0.45); }
    .submit-btn:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ─── Login Wall ───────────────────────────────────────────── */
    .login-wall {
      text-align: center; padding: 48px 24px;
      background: var(--glass-bg); backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border); border-radius: 24px;
      box-shadow: var(--glass-shadow);
      animation: slideUp 0.45s ease both;
    }
    .login-wall .lw-icon { font-size: 52px; margin-bottom: 16px; }
    .login-wall h2 { font-size: 26px; margin-bottom: 8px; }
    .login-wall p { color: var(--text-muted); font-size: 15px; line-height: 1.6; max-width: 380px; margin: 0 auto 28px; }
    .lw-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 36px; background: var(--secondary); color: #111827;
      font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 800;
      border-radius: 50px; text-decoration: none; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(245,158,11,0.35);
      transition: all 0.3s;
    }
    .lw-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,158,11,0.45); }

    @media (min-width: 600px) {
      .page { padding-top: 108px; }
      .form-card { padding: 36px 32px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-back" id="nav-back-btn" href="/service-detail" aria-label="Back to service details">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </a>
  <a href="/" class="nav-logo">Snappito<span>⚡</span></a>
</nav>

<main class="page">

  <!-- Service Summary Banner -->
  <div class="service-summary">
    <div class="ss-left">
      <span class="ss-label">Booking for</span>
      <span class="ss-name" id="summary-name">—</span>
      <a class="change-link" id="summary-change-link" href="/service-detail">← Change service</a>
    </div>
    <div class="ss-right">
      <div class="ss-price" id="summary-price">—<sub></sub></div>
    </div>
  </div>

  <!-- Login Wall (shown if not logged in) -->
  <div class="login-wall hidden" id="login-wall">
    <div class="lw-icon">🔐</div>
    <h2>Login to Continue</h2>
    <p>You need to be logged in to book a service. Your account helps us track your bookings and keep everything safe.</p>
    <a class="lw-btn" id="login-redirect">Login / Sign Up →</a>
  </div>

  <!-- Booking Form (shown when logged in) -->
  <div class="form-card hidden" id="booking-form-card">
    <h2>Schedule Your Visit</h2>
    <p class="subtitle">We'll confirm your booking within minutes.</p>

    <form id="booking-form" novalidate>
      <!-- Name -->
      <div class="input-group">
        <label for="b-name">Full Name</label>
        <input type="text" id="b-name" name="name" placeholder="e.g. Priya Sharma" required>
      </div>

      <!-- Phone -->
      <div class="input-group">
        <label for="b-phone">Phone Number</label>
        <div class="phone-row">
          <span class="phone-prefix">+91</span>
          <input type="tel" id="b-phone" name="phone" placeholder="10-digit mobile number"
                 pattern="[0-9]{10}" required maxlength="10">
        </div>
      </div>

      <!-- Date + Time -->
      <div class="two-col">
        <div class="input-group">
          <label for="b-date">Preferred Date</label>
          <input type="date" id="b-date" name="date" required>
        </div>
        <div class="input-group">
          <label for="b-time">Preferred Time</label>
          <input type="time" id="b-time" name="time" required>
        </div>
      </div>

      <!-- Address -->
      <div class="input-group">
        <label for="b-address">Service Address</label>
        <select id="b-address" onchange="handleAddressChange(this.value)">
          <option value="">Select an address</option>
          <option value="new">+ Add New Address</option>
        </select>
      </div>

      <!-- Inline Address Entry -->
      <div class="addr-inline" id="addr-inline">
        <div class="two-col">
          <div class="input-group">
            <label>Pincode</label>
            <input type="text" id="addr-zip" placeholder="XXXXXX" maxlength="6"
                   oninput="fetchPincode(this.value)">
            <small id="pincode-status" style="font-size:11px;opacity:0.7;"></small>
          </div>
          <div class="input-group">
            <label>Label (e.g. Home)</label>
            <input type="text" id="addr-label" placeholder="Home / Work">
          </div>
        </div>
        <div class="input-group" style="margin-top:10px;">
          <label>Address Line</label>
          <input type="text" id="addr-line" placeholder="Street, Building, Flat No.">
        </div>
        <div class="two-col" style="margin-top:10px;">
          <div class="input-group">
            <label>City</label>
            <input type="text" id="addr-city">
          </div>
          <div class="input-group">
            <label>State</label>
            <input type="text" id="addr-state">
          </div>
        </div>
      </div>

      <!-- Special Instructions (optional) -->
      <div class="input-group">
        <label for="b-notes">Special Instructions <span style="opacity:0.5;font-weight:400">(optional)</span></label>
        <textarea id="b-notes" name="notes" placeholder="E.g. dog in the house, ring the bell twice…" rows="3"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Confirm Booking</button>
    </form>
  </div>

</main>

<script src="config.js"></script>
<script src="toast.js"></script>
<script>
  // ─── Read URL Params ────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const serviceId  = params.get('service_id')  || '';
  const serviceName= params.get('service')     || 'Selected Service';
  const servicePrice = params.get('price')     || '';

  // ─── Populate Summary Bar ───────────────────────────────────────
  document.getElementById('summary-name').textContent = serviceName;
  document.getElementById('summary-price').innerHTML =
    servicePrice ? `₹${Number(servicePrice).toLocaleString('en-IN')}<sub>onwards</sub>` : '—';

  // Fix back-link to return to the exact service
  const backHref = serviceId
    ? `/service-detail?service=${encodeURIComponent(serviceId)}`
    : '/service-detail';
  document.getElementById('nav-back-btn').href = backHref;
  document.getElementById('summary-change-link').href = backHref;

  // ─── Auth Gate ──────────────────────────────────────────────────
  const token = localStorage.getItem('token');

  const loginWall       = document.getElementById('login-wall');
  const bookingFormCard = document.getElementById('booking-form-card');

  if (!token) {
    loginWall.classList.remove('hidden');
    // Store intended destination so login can redirect back
    const returnUrl = encodeURIComponent(window.location.href);
    document.getElementById('login-redirect').href = `/login?next=${returnUrl}`;
  } else {
    bookingFormCard.classList.remove('hidden');
    prefillUser();
  }

  // ─── Prefill User Profile ───────────────────────────────────────
  async function prefillUser() {
    try {
      const res = await fetch(`${API_BASE_URL}/api/user/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        if (user.full_name) document.getElementById('b-name').value = user.full_name;
        if (user.phone)     document.getElementById('b-phone').value = user.phone.replace(/^\+91\s?/, '');
        loadAddresses();
      } else {
        // Token invalid — show login wall
        localStorage.removeItem('token');
        bookingFormCard.classList.add('hidden');
        loginWall.classList.remove('hidden');
      }
    } catch(e) {}
  }

  async function loadAddresses() {
    try {
      const res = await fetch(`${API_BASE_URL}/api/user/addresses`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const addresses = await res.json();
        const sel = document.getElementById('b-address');
        const addrOptions = addresses.map(addr => {
          const lbl = addr.label ? `[${addr.label.toUpperCase()}] ` : '';
          const txt = `${lbl}${addr.line1}, ${addr.city} (${addr.zipcode})`;
          return `<option value="${addr.id}" ${addr.is_default ? 'selected' : ''}>${txt}</option>`;
        });
        sel.innerHTML = '<option value="">Select an address</option>' +
                        addrOptions.join('') +
                        '<option value="new">+ Add New Address</option>';
      }
    } catch(e) {}
  }

  // ─── Address Inline Form ────────────────────────────────────────
  window.handleAddressChange = function(val) {
    document.getElementById('addr-inline').style.display = (val === 'new') ? 'block' : 'none';
  };

  window.fetchPincode = async function(pin) {
    const status = document.getElementById('pincode-status');
    if (pin.length === 6) {
      status.textContent = 'Searching…';
      try {
        const r = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
        const d = await r.json();
        if (d[0].Status === 'Success') {
          const po = d[0].PostOffice[0];
          document.getElementById('addr-city').value  = po.District;
          document.getElementById('addr-state').value = po.State;
          status.textContent = '✓ Found'; status.style.color = 'var(--primary)';
        } else { status.textContent = 'Not found'; status.style.color = '#ef4444'; }
      } catch(e) { status.textContent = 'Error'; }
    } else { status.textContent = ''; }
  };

  // ─── Phone: digits only ─────────────────────────────────────────
  document.getElementById('b-phone').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').substring(0, 10);
  });

  // ─── Set min date to today ──────────────────────────────────────
  document.getElementById('b-date').min = new Date().toISOString().split('T')[0];

  // ─── Form Submit ────────────────────────────────────────────────
  const form      = document.getElementById('booking-form');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name  = document.getElementById('b-name').value.trim();
    const phone = document.getElementById('b-phone').value.trim();
    const date  = document.getElementById('b-date').value;
    const time  = document.getElementById('b-time').value;
    const addrSel = document.getElementById('b-address');
    const notes = document.getElementById('b-notes').value.trim();

    if (!name || !phone || !date || !time) {
      showToast('Please fill in all required fields.', 'error'); return;
    }
    if (phone.length !== 10) {
      showToast('Please enter a valid 10-digit phone number.', 'error'); return;
    }
    if (!serviceId) {
      showToast('No service selected. Please go back and choose one.', 'error'); return;
    }

    let finalAddress = '';
    if (addrSel.value === 'new') {
      const label = document.getElementById('addr-label').value;
      const line1 = document.getElementById('addr-line').value.trim();
      const city  = document.getElementById('addr-city').value.trim();
      const state = document.getElementById('addr-state').value.trim();
      const zip   = document.getElementById('addr-zip').value.trim();
      if (!line1 || !city || !zip) { showToast('Please complete the address fields.', 'error'); return; }
      finalAddress = `${label ? '['+label.toUpperCase()+'] ' : ''}${line1}, ${city} - ${zip}`;

      // Save address to backend
      try {
        await fetch(`${API_BASE_URL}/api/user/addresses`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ label, line1, city, state, zipcode: zip, country: 'India' })
        });
      } catch(err) { console.error('Address save failed', err); }

    } else if (addrSel.value) {
      finalAddress = addrSel.options[addrSel.selectedIndex].text;
    } else {
      showToast('Please select or add an address.', 'error'); return;
    }

    submitBtn.textContent = 'Confirming…';
    submitBtn.disabled = true;

    const bookingData = {
      service_id:     serviceId,
      scheduled_time: `${date}T${time}:00`,
      address:        finalAddress,
      instructions:   notes || 'Booked via Snappito website'
    };

    try {
      const res = await fetch(`${API_BASE_URL}/api/service/book`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(bookingData)
      });

      if (res.ok) {
        showToast('🎉 Booking Confirmed!', 'success');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1600);
      } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.message || 'Booking failed. Please try again.', 'error');
        submitBtn.textContent = 'Confirm Booking';
        submitBtn.disabled = false;
      }
    } catch(err) {
      showToast('Connection error. Please try again.', 'error');
      submitBtn.textContent = 'Confirm Booking';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
