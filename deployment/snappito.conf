server {
    listen 80;
    server_name _; # Responds to all IP requests or your domain

    # Frontend Static Files
    root /var/www/snappito;
    index index.html;

    # Smart Routing for SPA (Single Page Apps)
    location / {
        # Redirect clean URLs (like /login) to .html files if they exist
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running payment requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Security: Disable access to .env files
    location ~ /\.env {
        deny all;
    }
}
