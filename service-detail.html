<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Details - Snappito</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/components/ui/Toast.css">
  <style>
    :root {
      --primary:      #10b981;
      --primary-dark: #059669;
      --secondary:    #f59e0b;
      --text-main:    #111827;
      --text-muted:   #64748b;
      --bg-light:     #f8fafc;
      --card-bg:      #ffffff;
      --card-border:  #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-main); line-height: 1.5; }
    h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; letter-spacing: -0.02em; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    .hero-banner { height: 320px; background-size: cover; background-position: center; border-radius: 0 0 40px 40px; }
    .detail-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; margin-top: -80px; padding-bottom: 100px; }
    
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 32px; padding: 40px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.03), 0 10px 10px -5px rgba(0,0,0,0.02); }
    
    .list-item { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; font-size: 15px; }
    .check-icon { color: var(--primary); font-weight: 800; }
    .cross-icon { color: #ef4444; font-weight: 800; }

    .booking-card { position: sticky; top: 40px; }
    .price-display { font-size: 36px; font-weight: 800; color: #1e293b; margin-bottom: 24px; }
    
    .tier-selector { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .tier-option { padding: 16px 20px; border: 2px solid var(--card-border); border-radius: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
    .tier-option.active { border-color: var(--primary); background: rgba(16,185,129,0.04); }
    .tier-option h4 { font-size: 15px; margin-bottom: 2px; }
    .tier-option span { font-size: 13px; color: var(--text-muted); }
    .btn-book { width: 100%; padding: 18px; border-radius: 50px; background: var(--primary); color: white; border: none; font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px -5px rgba(16,185,129,0.3); }
    .btn-book:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 15px 25px -5px rgba(16,185,129,0.4); }
  </style>
</head>
<body>

<div id="service-app">
  <div class="hero-banner" id="hero-img"></div>
  <div class="container">
    <div class="detail-layout">
      <!-- Content Section -->
      <div class="main-content">
        <div class="card" style="margin-bottom: 30px;">
          <h1 id="service-title">Loading...</h1>
          <p id="service-desc" style="color: var(--text-muted); margin-top: 16px; font-size: 17px; max-width: 600px;"></p>
        </div>
        
        <div id="included-card" class="card" style="margin-bottom: 30px;">
            <h3 style="margin-bottom: 24px; font-size: 20px;">What's Included</h3>
            <div id="included-list"></div>
        </div>

        <div id="excluded-card" class="card">
            <h3 style="margin-bottom: 24px; font-size: 20px; color: #1e293b;">What's NOT Included</h3>
            <div id="excluded-list"></div>
        </div>
      </div>

      <!-- Booking Sidebar -->
      <div class="booking-sidebar">
        <div class="booking-card card">
          <div class="price-display">₹<span id="display-price">0</span></div>
          <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 16px; font-weight: 500;">Select Tier</p>
          <div class="tier-selector">
            <div class="tier-option active" data-tier="Express" onclick="selectTier('Express')">
              <h4>Express</h4>
              <span>30-45 mins</span>
            </div>
            <div class="tier-option" data-tier="Standard" onclick="selectTier('Standard')">
              <h4>Standard</h4>
              <span>1 - 1.5 hrs</span>
            </div>
          </div>
          <button class="btn-book" onclick="proceedToBooking()">Book Now</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="debug-error" style="display: none; background: #fee2e2; color: #991b1b; padding: 20px; border-radius: 12px; margin: 20px; white-space: pre-wrap; font-family: monospace;"></div>

<script>
  window.onerror = function(msg, url, line, col, error) {
    const debug = document.getElementById('debug-error');
    debug.style.display = 'block';
    debug.innerText = `Error: ${msg}\nUrl: ${url}\nLine: ${line}`;
    return false;
  };
  window.addEventListener('unhandledrejection', function(event) {
    const debug = document.getElementById('debug-error');
    debug.style.display = 'block';
    debug.innerText = `Promise Rejection: ${event.reason}`;
  });
</script>

<script src="src/components/ui/Toast.js"></script>
<script type="module" src="src/app/ServiceDetail.js"></script>
</body>
</html>
